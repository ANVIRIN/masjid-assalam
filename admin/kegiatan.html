<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Kegiatan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- ICON -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/kegiatan.css">
</head>

<body class="bg-light">
    <div class="container py-5"> <!-- HEADER -->
        <div class="page-header">
            <div>
                <h1> 📚 CRUD Kegiatan </h1>
                <p> Kelola kegiatan rutin Masjid Besar Assalam </p>
            </div> <a href="dashboard.html" class="back-btn"> <i class="bi bi-arrow-left"></i> Dashboard </a>
        </div> <!-- FORM -->
        <div class="modern-card">
            <div class="card-header-custom">
                <h3> <i class="bi bi-calendar-event-fill"></i> Tambah Kegiatan Baru </h3>
            </div>
            <div class="card-body-custom">
                <div class="row g-4"> <!-- NAMA -->
                    <div class="col-md-3"> <label class="form-label"> Nama Kegiatan </label> <input type="text" id="nama"
                            class="form-control modern-input" placeholder="Ngaji Kitab"> </div> <!-- HARI -->
                    <div class="col-md-2"> <label class="form-label"> Hari </label> <input type="text" id="hari"
                            class="form-control modern-input" placeholder="Senin"> </div> <!-- WAKTU -->
                    <div class="col-md-2"> <label class="form-label"> Waktu </label> <input type="text" id="waktu"
                            class="form-control modern-input" placeholder="19:00 WIB"> </div> <!-- DESKRIPSI -->
                    <div class="col-md-3"> <label class="form-label"> Deskripsi </label> <input type="text" id="deskripsi"
                            class="form-control modern-input" placeholder="Kajian rutin kitab"> </div> <!-- BUTTON -->
                    <div class="col-md-2 d-flex align-items-end"> <button onclick="tambahKegiatan()" class="btn-modern"> <i
                                class="bi bi-plus-circle"></i> Tambah </button> </div>
                </div>
            </div>
        </div> <!-- TABLE -->
        <div class="table-card mt-5">
            <div class="table-header">
                <h3> <i class="bi bi-list-ul"></i> Data Kegiatan </h3>
            </div>
            <div class="table-responsive">
                <table class="table modern-table align-middle">
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>Hari</th>
                            <th>Waktu</th>
                            <th>Deskripsi</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="data-kegiatan"> </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/kegiatan.js"></script>
    <script> 
    if( localStorage.getItem("admin_login") !== "true" ){ 
        window.location.href = "login.html"; 
        } 
    </script>
</body>

</html>
