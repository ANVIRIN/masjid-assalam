services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: masjid-backend
    ports:
      - "5000:5000"
    env_file:
      - ./.env
    environment:
      - PORT=5000
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
    volumes:
      - ./uploads:/app/uploads
      - ./data.db:/app/data.db
    restart: unless-stopped
