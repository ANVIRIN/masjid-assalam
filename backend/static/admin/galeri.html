<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>CRUD Galeri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- ICON -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/galeri.css') }}">
</head>

<body class="bg-light">
    <div class="container py-5"> <!-- HEADER -->
        <div class="page-header">
            <div>
                <h1> 🖼 CRUD Galeri </h1>
                <p> Kelola foto dan dokumentasi Masjid Besar Assalam </p>
            </div> <a href="dashboard.html" class="back-btn"> <i class="bi bi-arrow-left"></i> Dashboard </a>
        </div> <!-- FORM -->
        <div class="upload-card">
            <div class="upload-header">
                <h3> <i class="bi bi-cloud-upload-fill"></i> Upload Foto Baru </h3>
            </div>
            <div class="upload-body">
                <div class="row g-4"> <!-- FILE -->
                    <div class="col-md-5"> <label class="form-label"> Pilih Foto </label> <input type="file" id="gambar"
                            class="form-control modern-input"> </div> <!-- JUDUL -->
                    <div class="col-md-5"> <label class="form-label"> Judul Foto </label> <input type="text" id="judul"
                            class="form-control modern-input" placeholder="Contoh: Kajian Jumat"> </div> <!-- BUTTON -->
                    <div class="col-md-2 d-flex align-items-end"> <button onclick="uploadGaleri()" class="btn-upload"> <i
                                class="bi bi-upload"></i> Upload </button> </div>
                </div>
            </div>
        </div> <!-- LIST -->
        <div class="mt-5">
            <h2 class="section-title"> <i class="bi bi-images"></i> Daftar Galeri </h2>
            <div id="galeri-list" class="gallery-grid"> </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="{{ url_for('static', filename='js/supabase.js') }}"></script>
    <script src="{{ url_for('static', filename='js/galeri.js') }}"></script>
    <script>
    if (localStorage.getItem("admin_login") !== "true") {
        window.location.href = "login.html";
    }
    </script>
</body>

</html>
