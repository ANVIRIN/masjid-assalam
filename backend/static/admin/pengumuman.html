<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Pengumuman</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- ICON -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pengumuman.css') }}">
</head>

<body class="bg-light">
    <div class="container py-5"> <!-- HEADER -->
        <div class="page-header">
            <div>
                <h1> 📢 CRUD Pengumuman </h1>
                <p> Kelola informasi dan pengumuman Masjid Besar Assalam </p>
            </div> <a href="dashboard.html" class="back-btn"> <i class="bi bi-arrow-left"></i> Dashboard </a>
        </div> <!-- FORM -->
        <div class="modern-card">
            <div class="card-header-custom">
                <h3> <i class="bi bi-megaphone-fill"></i> Tambah Pengumuman Baru </h3>
            </div>
            <div class="card-body-custom">
                <div class="row g-4"> <!-- JUDUL -->
                    <div class="col-12"> <label class="form-label"> Judul Pengumuman </label> <input type="text" id="judul"
                            class="form-control modern-input" placeholder="Masukkan judul pengumuman"> </div> <!-- ISI -->
                    <div class="col-12"> <label class="form-label"> Isi Pengumuman </label> <textarea id="isi" rows="5"
                            class="form-control modern-input modern-textarea"
                            placeholder="Tulis isi pengumuman disini..."></textarea> </div> <!-- TANGGAL -->
                    <div class="col-md-6"> <label class="form-label"> Tanggal </label> <input type="date" id="tanggal"
                            class="form-control modern-input"> </div> <!-- BUTTON -->
                    <div class="col-md-6 d-flex align-items-end"> <button onclick="tambahPengumuman()" class="btn-modern">
                            <i class="bi bi-plus-circle"></i> Tambah Pengumuman </button> </div>
                </div>
            </div>
        </div> <!-- LIST PENGUMUMAN -->
        <div class="mt-5">
            <h2 class="section-title mb-4"> <i class="bi bi-bell-fill"></i> Daftar Pengumuman </h2>
            <div id="list-pengumuman" class="announcement-grid"> </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="{{ url_for('static', filename='js/supabase.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pengumuman.js') }}"></script>
</body>

</html>
