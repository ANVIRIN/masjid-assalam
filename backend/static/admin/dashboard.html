<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com"> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>

<body>
    <div class="dashboard-wrapper"> <!-- SIDEBAR -->
        <aside class="sidebar">
            <div>
                <h2 class="logo"> 🕌 Admin Masjid </h2>
                <ul class="menu">
                    <li> <a href="dashboard.html" class="active"> <i class="bi bi-grid-fill"></i> Dashboard </a> </li>
                    <li> <a href="kegiatan.html"> <i class="bi bi-calendar-event"></i> Kegiatan </a> </li>
                    <li> <a href="galeri.html"> <i class="bi bi-images"></i> Galeri </a> </li>
                    <li> <a href="pengumuman.html"> <i class="bi bi-megaphone"></i> Pengumuman </a> </li>
                    <li> <a href="khotib.html"> <i class="bi bi-mic-fill"></i> Khotib </a> </li>
                </ul>
            </div> <button class="logout-btn" type="button" onclick="logout()"> <i class="bi bi-box-arrow-right"></i> Logout </button>
        </aside> <!-- MAIN -->
        <main class="main-content"> <!-- HEADER -->
            <div class="topbar">
                <div>
                    <h1> Dashboard Admin </h1>
                    <p> Masjid Besar Assalam </p>
                </div>
                <div class="admin-profile">
                    <div class="avatar"> A </div>
                    <div>
                        <h5 id="admin-email"> admin@assalam.com </h5> <small> Administrator </small>
                    </div>
                </div>
            </div> <!-- STATISTICS -->
            <div class="stats-grid"> <!-- KEGIATAN -->
                <div class="stat-card">
                    <div>
                        <h5>Total Kegiatan</h5>
                        <h2 id="total-kegiatan"> 0 </h2>
                    </div>
                    <div class="stat-icon green"> <i class="bi bi-calendar-event"></i> </div>
                </div> <!-- GALERI -->
                <div class="stat-card">
                    <div>
                        <h5>Total Galeri</h5>
                        <h2 id="total-galeri"> 0 </h2>
                    </div>
                    <div class="stat-icon blue"> <i class="bi bi-images"></i> </div>
                </div> <!-- PENGUMUMAN -->
                <div class="stat-card">
                    <div>
                        <h5>Total Pengumuman</h5>
                        <h2 id="total-pengumuman"> 0 </h2>
                    </div>
                    <div class="stat-icon orange"> <i class="bi bi-megaphone"></i> </div>
                </div> <!-- KHOTIB -->
                <div class="stat-card">
                    <div>
                        <h5>Total Jadwal Khotib</h5>
                        <h2 id="total-khotib"> 0 </h2>
                    </div>
                    <div class="stat-icon purple"> <i class="bi bi-mic-fill"></i> </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="{{ url_for('static', filename='js/supabase.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script> 
    if (localStorage.getItem("admin_login") !== "true") { 
        window.location.href = "login.html"; 
    } 
    async function getUser() { 
        const { data, error } = await client.auth.getUser(); 
        if (error || !data?.user) { 
            localStorage.removeItem("admin_login"); 
            window.location.href = "login.html"; 
            return; 
        }
        document.getElementById("admin-email").innerText = data.user.email; 
    } 
    getUser();
    </script>
    <script> 
    async function logout(){ 
        await client.auth.signOut(); 
        localStorage.removeItem( "admin_login" ); 
        window.location.href = "login.html"; 
        } 
    </script> 
</body>

</html>
